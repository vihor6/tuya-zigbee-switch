name: Build Firmware

on:
  workflow_dispatch:
    inputs:
      boards:
        description: "Optional space-separated board keys to build. Leave empty to run the staged Silabs Architecture + Regression gates."
        required: false
        default: ""
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  define-silabs-matrices:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.boards == '' }}
    runs-on: ubuntu-latest
    outputs:
      architecture: ${{ steps.matrices.outputs.architecture }}
      regression: ${{ steps.matrices.outputs.regression }}
    steps:
      - id: matrices
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json

          def entries(boards, sdk_line, sdk_version):
              return [
                  {
                      "board": board,
                      "expected_sdk_line": sdk_line,
                      "expected_sdk_version": sdk_version,
                  }
                  for board in boards
              ]

          architecture = [
              {
                  "board": "SWITCH_TUYA_VQJOB26P_TS0013",
                  "expected_sdk_line": "gecko_sdk",
                  "expected_sdk_version": "4.5.0",
              },
              {
                  "board": "MODULE_TUYA_ZS2S_TS0001",
                  "expected_sdk_line": "simplicity_sdk",
                  "expected_sdk_version": "2025.6.2",
              },
              {
                  "board": "MODULE_SONOFF_ZBMINIL2",
                  "expected_sdk_line": "simplicity_sdk",
                  "expected_sdk_version": "2025.6.2",
              },
          ]

    - name: Resolve authoritative Silabs selector manifest
      id: silabs_selector
      shell: bash
      run: |
        set -euo pipefail

        manifest=$(make -s -f board.mk print-silabs-sdk-install-manifest)
        cache_key=$(printf '%s\n' "$manifest" | awk -F'|' 'BEGIN { sep="" } { printf "%s%s-%s", sep, $1, $2; sep="__" } END { print "" }')
        architecture_boards=$(make -s -f board.mk print-silabs-architecture-gate-boards | xargs)
        mg13_boards=$(make -s -f board.mk print-silabs-mg13-target-boards | xargs)
        non_mg13_boards=$(make -s -f board.mk print-silabs-non-mg13-regression-boards | xargs)
        regression_boards=$(make -s -f board.mk print-silabs-regression-gate-boards | xargs)

        {
          echo "cache_key=$cache_key"
          echo "architecture_boards=$architecture_boards"
          echo "mg13_boards=$mg13_boards"
          echo "non_mg13_boards=$non_mg13_boards"
          echo "regression_boards=$regression_boards"
        } >> "$GITHUB_OUTPUT"

    - name: Cache Silicon Labs Tools
      uses: actions/cache@v3
      with:
        path: silabs_tools
        key: silabs-tools-${{ runner.os }}-${{ steps.silabs_selector.outputs.cache_key }}

          regression = (
              entries(mg13_boards, "gecko_sdk", "4.5.0")
              + entries(mg21_boards, "simplicity_sdk", "2025.6.2")
              + entries(mg22_boards, "simplicity_sdk", "2025.6.2")
          )

          print("architecture=" + json.dumps({"include": architecture}, separators=(",", ":")))
          print("regression=" + json.dumps({"include": regression}, separators=(",", ":")))
          PY

  architecture-gate:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.boards == '' }}
    needs: define-silabs-matrices
    name: Architecture Gate • ${{ matrix.board }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-silabs-matrices.outputs.architecture) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

    - name: Build staged verification set
      shell: bash
      run: |
        set -euo pipefail
        source .venv/bin/activate

        build_board() {
          local board="$1"
          local build
          local device_type

          build=$(yq -r ".${board}.build // \"no\"" device_db.yaml)
          device_type=$(yq -r ".${board}.device_type" device_db.yaml)

          if [ "$build" = "no" ]; then
            echo "Skipping $board as building this model is disabled in the db."
            return 0
          fi

          echo "Building $board ($device_type)"
          BOARD="$board" make -s -f board.mk print-silabs-sdk-provenance || true
          BOARD="$board" make board/build

          if [ "$device_type" = "end_device" ]; then
            ls -l "bin/end_device/${board}_END_DEVICE/"
          else
            ls -l "bin/router/${board}/"
          fi
        }

        run_group() {
          local label="$1"
          shift
          echo "::group::${label}"
          for board in "$@"; do
            build_board "$board"
          done
          echo "::endgroup::"
        }

        if [ -n "${{ inputs.boards }}" ]; then
          read -r -a requested_boards <<< "${{ inputs.boards }}"
          run_group "Requested board build" "${requested_boards[@]}"
        else
          read -r -a architecture_boards <<< "${{ steps.silabs_selector.outputs.architecture_boards }}"
          read -r -a regression_boards <<< "${{ steps.silabs_selector.outputs.regression_boards }}"
          run_group "Architecture Gate" "${architecture_boards[@]}"
          run_group "Regression Gate" "${regression_boards[@]}"
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-builds
        path: |
          bin/router/**
          bin/end_device/**

    - name: Summarize staged verification coverage
      if: ${{ inputs.boards == '' }}
      run: |
        {
          echo "### Silabs staged verification"
          echo "- Architecture Gate result: PASS"
          echo "- Regression Gate result: PASS"
          echo "- Architecture Gate boards: ${{ steps.silabs_selector.outputs.architecture_boards }}"
          echo "- MG13 targeted set: ${{ steps.silabs_selector.outputs.mg13_boards }}"
          echo "- Frozen non-MG13 population: ${{ steps.silabs_selector.outputs.non_mg13_boards }}"
          echo "- Regression Gate boards: ${{ steps.silabs_selector.outputs.regression_boards }}"
        } >> "$GITHUB_STEP_SUMMARY"
