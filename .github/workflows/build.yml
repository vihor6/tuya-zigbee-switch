name: Build Firmware

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "compile_only 只编译固件；full_build 执行完整 board/build 流程"
        required: false
        type: choice
        default: compile_only
        options:
          - compile_only
          - full_build
      boards:
        description: "可选，空格分隔的板子名。填写后只编译这些板子，并忽略 device_db.yaml 的 build 字段。"
        required: false
        default: ""

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      boards_json: ${{ steps.plan.outputs.boards_json }}
      board_count: ${{ steps.plan.outputs.board_count }}
      build_mode: ${{ steps.plan.outputs.build_mode }}
      need_silabs: ${{ steps.plan.outputs.need_silabs }}
      need_telink: ${{ steps.plan.outputs.need_telink }}
      clear_indexes: ${{ steps.plan.outputs.clear_indexes }}
      silabs_manifest_hash: ${{ steps.plan.outputs.silabs_manifest_hash }}
      artifact_name: ${{ steps.plan.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install planning dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make python3 python3-yaml

      - name: Resolve build plan
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_MODE: ${{ inputs.mode }}
          REQUESTED_BOARDS: ${{ inputs.boards }}
        run: |
          python3 .github/scripts/resolve_build_plan.py \
            device_db.yaml \
            "${EVENT_NAME}" \
            "${REQUESTED_MODE:-compile_only}" \
            "${REQUESTED_BOARDS}" >> "$GITHUB_OUTPUT"

      - name: Summarize plan
        env:
          BOARDS_JSON: ${{ steps.plan.outputs.boards_json }}
          BUILD_MODE: ${{ steps.plan.outputs.build_mode }}
          BOARD_COUNT: ${{ steps.plan.outputs.board_count }}
          REQUESTED_BOARDS: ${{ inputs.boards }}
          ARTIFACT_NAME: ${{ steps.plan.outputs.artifact_name }}
        run: |
          python3 - <<'PY'
          import json
          import os

          boards = json.loads(os.environ["BOARDS_JSON"])
          summary = [
              "## Build plan",
              "",
              f"- mode: {os.environ['BUILD_MODE']}",
              f"- board_count: {os.environ['BOARD_COUNT']}",
              f"- boards override: {'yes' if os.environ['REQUESTED_BOARDS'].strip() else 'no'}",
              f"- artifact_name: {os.environ['ARTIFACT_NAME']}",
              "",
              "### Boards",
          ]
          summary.extend(f"- {board}" for board in boards)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("\n".join(summary) + "\n")
          PY

  build:
    needs: plan
    if: ${{ needs.plan.outputs.board_count != '0' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make python3 python3-venv python3-yaml yq unzip wget

      - name: Install Silabs build dependencies
        if: ${{ needs.plan.outputs.need_silabs == 'true' }}
        run: |
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Set up JDK 21
        if: ${{ needs.plan.outputs.need_silabs == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Restore Silicon Labs tools cache
        if: ${{ needs.plan.outputs.need_silabs == 'true' }}
        uses: actions/cache@v4
        with:
          path: silabs_tools
          key: silabs-tools-${{ runner.os }}-${{ needs.plan.outputs.silabs_manifest_hash }}

      - name: Restore Telink tools cache
        if: ${{ needs.plan.outputs.need_telink == 'true' }}
        uses: actions/cache@v4
        with:
          path: telink_tools
          key: telink-tools-${{ runner.os }}-v3.7.2.0

      - name: Restore Python virtualenv cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: python-venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python requirements
        run: |
          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Install Silicon Labs tools
        if: ${{ needs.plan.outputs.need_silabs == 'true' }}
        run: |
          . .venv/bin/activate
          make silabs/tools/all

      - name: Install Telink tools
        if: ${{ needs.plan.outputs.need_telink == 'true' }}
        run: |
          . .venv/bin/activate
          make telink/tools/all

      - name: Clear OTA indexes
        if: ${{ needs.plan.outputs.clear_indexes == 'true' }}
        run: |
          . .venv/bin/activate
          make tools/clean_z2m_index

      - name: Build selected boards
        env:
          BOARDS_JSON: ${{ needs.plan.outputs.boards_json }}
          BUILD_MODE: ${{ needs.plan.outputs.build_mode }}
        run: |
          . .venv/bin/activate
          python3 - <<'PY' > planned_boards.txt
          import json
          import os
          for board in json.loads(os.environ["BOARDS_JSON"]):
              print(board)
          PY
          while read -r board; do
            [ -n "$board" ] || continue
            .github/scripts/build_board.sh "$board" "${BUILD_MODE}" artifacts/builds
          done < planned_boards.txt

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.plan.outputs.artifact_name }}
          path: |
            artifacts/builds/**

  summarize:
    if: ${{ always() }}
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - name: Summarize build result
        run: |
          {
            echo "## Build result"
            echo ""
            echo "- mode: ${{ needs.plan.outputs.build_mode }}"
            echo "- board_count: ${{ needs.plan.outputs.board_count }}"
            echo "- build job: ${{ needs.build.result }}"
            echo "- artifact_name: ${{ needs.plan.outputs.artifact_name }}"
            echo ""
            echo "下载位置：打开本次 run 页面，滚动到最下方 Artifacts 区域。"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.plan.outputs.board_count }}" != "0" ]; then
            test "${{ needs.build.result }}" = "success"
          fi
