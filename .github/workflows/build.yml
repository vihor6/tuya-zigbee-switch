name: Build Firmware

on:
  workflow_dispatch:
    inputs:
      boards:
        description: "Optional space-separated board keys to build. Leave empty to run the staged Silabs Architecture + Regression gates."
        required: false
        default: ""
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  define_silabs_plan:
    runs-on: ubuntu-latest
    outputs:
      cache_key: ${{ steps.plan.outputs.cache_key }}
      architecture: ${{ steps.plan.outputs.architecture }}
      regression: ${{ steps.plan.outputs.regression }}
      architecture_boards: ${{ steps.plan.outputs.architecture_boards }}
      mg13_boards: ${{ steps.plan.outputs.mg13_boards }}
      non_mg13_boards: ${{ steps.plan.outputs.non_mg13_boards }}
      regression_boards: ${{ steps.plan.outputs.regression_boards }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve authoritative Silabs selector manifest
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          manifest="$(make -s -f board.mk print-silabs-sdk-install-manifest)"
          cache_key="$(printf '%s\n' "$manifest" | awk -F'|' 'BEGIN { sep="" } { printf "%s%s-%s", sep, $1, $2; sep="__" } END { print "" }')"
          architecture_boards="$(make -s -f board.mk print-silabs-architecture-gate-boards | xargs)"
          mg13_boards="$(make -s -f board.mk print-silabs-mg13-target-boards | xargs)"
          non_mg13_boards="$(make -s -f board.mk print-silabs-non-mg13-regression-boards | xargs)"
          regression_boards="$(make -s -f board.mk print-silabs-regression-gate-boards | xargs)"

          architecture_json="$(
            ARCHITECTURE_BOARDS="$architecture_boards" python3 - <<'PY'
          import json
          import os
          import subprocess

          def entry(board: str) -> dict[str, str]:
              provenance = subprocess.check_output(
                  ["make", "-s", "-f", "board.mk", "print-silabs-sdk-provenance", f"BOARD={board}"],
                  text=True,
              ).strip()
              fields = dict(item.split("=", 1) for item in provenance.split())
              return {
                  "board": board,
                  "expected_sdk_line": fields["SDK_LINE"],
                  "expected_sdk_version": fields["SDK_VERSION"],
              }

          boards = [board for board in os.environ["ARCHITECTURE_BOARDS"].split() if board]
          print(json.dumps({"include": [entry(board) for board in boards]}, separators=(",", ":")))
          PY
          )"

          regression_json="$(
            REGRESSION_BOARDS="$regression_boards" python3 - <<'PY'
          import json
          import os
          import subprocess

          def entry(board: str) -> dict[str, str]:
              provenance = subprocess.check_output(
                  ["make", "-s", "-f", "board.mk", "print-silabs-sdk-provenance", f"BOARD={board}"],
                  text=True,
              ).strip()
              fields = dict(item.split("=", 1) for item in provenance.split())
              return {
                  "board": board,
                  "expected_sdk_line": fields["SDK_LINE"],
                  "expected_sdk_version": fields["SDK_VERSION"],
              }

          boards = [board for board in os.environ["REGRESSION_BOARDS"].split() if board]
          print(json.dumps({"include": [entry(board) for board in boards]}, separators=(",", ":")))
          PY
          )"

          {
            echo "cache_key=$cache_key"
            echo "architecture=$architecture_json"
            echo "regression=$regression_json"
            echo "architecture_boards=$architecture_boards"
            echo "mg13_boards=$mg13_boards"
            echo "non_mg13_boards=$non_mg13_boards"
            echo "regression_boards=$regression_boards"
          } >> "$GITHUB_OUTPUT"

  architecture_gate:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.boards == '' }}
    needs: define_silabs_plan
    name: Architecture Gate • ${{ matrix.board }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define_silabs_plan.outputs.architecture) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make python3 python3-venv yq unzip wget gcc-arm-none-eabi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Silicon Labs Tools
        uses: actions/cache@v4
        with:
          path: silabs_tools
          key: silabs-tools-${{ runner.os }}-${{ needs.define_silabs_plan.outputs.cache_key }}

      - name: Cache Python Virtual Environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: python-venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Silicon Labs toolchain
        run: |
          make silabs/tools/all
          make setup_venv

      - name: Build and verify provenance
        run: .github/scripts/build_silabs_gate.sh "${{ matrix.board }}" "${{ matrix.expected_sdk_line }}" "${{ matrix.expected_sdk_version }}"

      - name: Upload architecture gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-gate-${{ matrix.board }}
          path: build-logs/${{ matrix.board }}.log

  regression_gate:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.boards == '' }}
    needs:
      - define_silabs_plan
      - architecture_gate
    name: Regression Gate • ${{ matrix.board }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.define_silabs_plan.outputs.regression) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make python3 python3-venv yq unzip wget gcc-arm-none-eabi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Silicon Labs Tools
        uses: actions/cache@v4
        with:
          path: silabs_tools
          key: silabs-tools-${{ runner.os }}-${{ needs.define_silabs_plan.outputs.cache_key }}

      - name: Cache Python Virtual Environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: python-venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Silicon Labs toolchain
        run: |
          make silabs/tools/all
          make setup_venv

      - name: Build and verify provenance
        run: .github/scripts/build_silabs_gate.sh "${{ matrix.board }}" "${{ matrix.expected_sdk_line }}" "${{ matrix.expected_sdk_version }}"

      - name: Upload regression gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-gate-${{ matrix.board }}
          path: build-logs/${{ matrix.board }}.log

  summarize_silabs_gates:
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.boards == '') }}
    needs:
      - define_silabs_plan
      - architecture_gate
      - regression_gate
    runs-on: ubuntu-latest
    steps:
      - name: Summarize staged verification coverage
        run: |
          {
            echo "### Silabs staged verification"
            echo "- Architecture Gate result: ${{ needs.architecture_gate.result }}"
            echo "- Regression Gate result: ${{ needs.regression_gate.result }}"
            echo "- Architecture Gate boards: ${{ needs.define_silabs_plan.outputs.architecture_boards }}"
            echo "- MG13 targeted set: ${{ needs.define_silabs_plan.outputs.mg13_boards }}"
            echo "- Frozen non-MG13 population: ${{ needs.define_silabs_plan.outputs.non_mg13_boards }}"
            echo "- Regression Gate boards: ${{ needs.define_silabs_plan.outputs.regression_boards }}"
          } >> "$GITHUB_STEP_SUMMARY"

  manual_selected_build:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.boards != '' }}
    needs: define_silabs_plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make python3 python3-venv yq unzip wget gcc-arm-none-eabi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Silicon Labs Tools
        uses: actions/cache@v4
        with:
          path: silabs_tools
          key: silabs-tools-${{ runner.os }}-${{ needs.define_silabs_plan.outputs.cache_key }}

      - name: Cache Telink Tools
        uses: actions/cache@v4
        with:
          path: telink_tools
          key: telink-tools-${{ runner.os }}-${{ hashFiles('src/telink/tools.mk') }}

      - name: Cache Python Virtual Environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: python-venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install SDKs and toolchain
        run: |
          make setup || (
            echo "dumping log:" &&
            cat /home/runner/work/tuya-zigbee-switch/tuya-zigbee-switch/silabs_tools/slc-cli/bin/slc-cli/configuration/*.log
          )

      - name: Build selected boards
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate

          for board in ${{ github.event.inputs.boards }}; do
            build="$(yq -r ".${board}.build // true" device_db.yaml)"
            device_type="$(yq -r ".${board}.device_type" device_db.yaml)"

            if [ "$build" = "false" ]; then
              echo "Skipping $board as building this model is disabled in the db."
              continue
            fi

            echo "Building selected board: $board ($device_type)"
            BOARD="$board" make -s -f board.mk print-silabs-sdk-provenance || true
            BOARD="$board" DEVICE_TYPE="$device_type" make board/build

            if [ "$device_type" = "end_device" ]; then
              ls -l "bin/end_device/${board}_END_DEVICE/"
            else
              ls -l "bin/router/${board}/"
            fi
          done

      - name: Upload selected build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selected-board-builds
          path: |
            bin/router/**
            bin/end_device/**
